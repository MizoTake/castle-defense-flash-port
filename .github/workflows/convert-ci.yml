name: Convert CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check
        run: |
          node --check game.js
          node --check app.js
      - name: Run tests
        run: node --test game.test.js
